name: Pytest

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-html requests
      - name: Run unit tests + reports
        run: |
          mkdir reports
          pytest -m unit --junitxml=reports/junit.xml --cov=src --cov-report=term-missing --cov-report=html --html=reports/report.html --self-contained-html
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            reports
            html-cov

  integration:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-html requests
      - name: Run integration tests
        run: |
          python -m integration -q
